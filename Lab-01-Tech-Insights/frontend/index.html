<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report Viewer</title>
    <meta name="description" content="Render report.md" />

    <!-- GitHub-like markdown styling (local) -->
    <link
      rel="stylesheet"
      href="./vendor/github-markdown.css"
    />

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <div class="brand">Report</div>
      </div>
    </header>

    <main class="container">
      <div id="status" class="status" hidden></div>
      <article id="content" class="markdown-body content" aria-live="polite"></article>
    </main>

    <footer class="footer">
      <div class="container footer__inner">
        <span>静态渲染：Markdown → HTML（浏览器端）</span>
      </div>
    </footer>

    <!-- Markdown + sanitizer (local) -->
    <script src="./vendor/marked.min.js"></script>
    <script src="./vendor/purify.min.js"></script>

    <script type="module" src="./main.js"></script>
  </body>
</html>
